<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Me | Amazon Discovery</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --accent-blue: #0071e3;
            --gray-text: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 {
            font-size: 40px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        p {
            color: var(--gray-text);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .chip {
            padding: 10px 14px;
            border-radius: 20px;
            background: #f2f2f7;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            user-select: none;
            color: var(--text-main);
        }

        .chip.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        #surprise-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 20px;
            font-weight: 500;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.3);
        }

        #surprise-btn:hover {
            transform: scale(1.03);
            background-color: #0077ed;
        }

        #surprise-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Random Shit on Amazon</h1>
    <p>Find something you didn't know you needed.</p>

    <div class="category-grid" id="categoryGrid"></div>

    <button id="surprise-btn">Surprise Me</button>
</div>

<script>
    const categories = [
        "Electronics", "Home & Kitchen", "Beauty", "Clothing", 
        "Pet Supplies", "Outdoors", "Toys", "Health", "Automotive", "Office"
    ];

    // Added a few samples for every category so the logic doesn't break
    const items = {
        "Electronics": ["Mechanical Keyboard", "Smart Watch", "Webcam", "Bluetooth Speaker", "VR Headset"],
        "Home & Kitchen": ["Air Fryer", "Espresso Machine", "Weighted Blanket", "Cast Iron Skillet", "Robot Vacuum"],
        "Beauty": ["Skincare Set", "Hair Dryer", "Massage Gun", "Makeup Mirror", "Electric Toothbrush"],
        "Clothing": ["Leather Wallet", "Canvas Backpack", "Polarized Sunglasses", "Beanie", "Wrist Watch"],
        "Pet Supplies": ["Automatic Feeder", "Cat Tree", "Dog Bed", "Aquarium Light", "Pet Camera"],
        "Outdoors": ["Camping Tent", "Hammock", "Binoculars", "Water Bottle", "Flashlight"],
        "Toys": ["LEGO Set", "Board Game", "RC Car", "Drone", "Puzzle"],
        "Health": ["Yoga Mat", "Air Purifier", "Foam Roller", "Humidifier", "Scale"],
        "Automotive": ["Dash Cam", "Car Vacuum", "Jump Starter", "Phone Mount", "Tire Inflator"],
        "Office": ["Desk Lamp", "Ergonomic Mouse", "Monitor Stand", "Notebook Set", "Paper Shredder"],
        "All": ["Bonsai Kit", "Crystal Ball", "Djembe Drum", "Film Camera", "Magic Kit"]
    };

    const modifiers = ["Vintage", "Professional", "Miniature", "Industrial", "Portable", "Luxury", "Smart", "Compact", "Retro", "Electric"];

    let activeCategory = "All";

    const grid = document.getElementById('categoryGrid');

    categories.forEach(cat => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerText = cat;
        
        chip.addEventListener('click', function() {
            const isAlreadyActive = this.classList.contains('active');
            
            // Remove active class from all chips
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            
            if (isAlreadyActive) {
                activeCategory = "All";
            } else {
                this.classList.add('active');
                activeCategory = cat;
            }
        });

        grid.appendChild(chip);
    });

    document.getElementById('surprise-btn').onclick = () => {
        let pool = [];

        // Logic to build the item pool
        if (activeCategory === "All") {
            // Merge all category lists
            Object.keys(items).forEach(key => {
                pool = pool.concat(items[key]);
            });
        } else {
            // Use specific category or fallback to All if specific category is empty
            pool = items[activeCategory] && items[activeCategory].length > 0 
                   ? items[activeCategory] 
                   : items["All"];
        }

        const randomItem = pool[Math.floor(Math.random() * pool.length)];
        const randomModifier = modifiers[Math.floor(Math.random() * modifiers.length)];
        
        const query = encodeURIComponent(`${randomModifier} ${randomItem}`);
        const amazonUrl = `https://www.amazon.com/s?k=${query}`;
        
        window.open(amazonUrl, '_blank');
    };
</script>

</body>
</html>
