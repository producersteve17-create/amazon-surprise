<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Me | Amazon Discovery</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --accent-blue: #0071e3;
            --gray-text: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 {
            font-size: 40px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        p {
            color: var(--gray-text);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .chip {
            padding: 10px 14px;
            border-radius: 20px;
            background: #f2f2f7;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            user-select: none;
            color: var(--text-main);
        }

        .chip.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        #surprise-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 20px;
            font-weight: 500;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.3);
        }

        #surprise-btn:hover {
            transform: scale(1.03);
            background-color: #0077ed;
        }

        #surprise-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Random Shit on Amazon</h1>
    <p>Find something you didn't know you needed.</p>

    <div class="category-grid" id="categoryGrid"></div>

    <button id="surprise-btn">Surprise Me</button>
</div>

<script>
    const categories = [
        "Electronics", "Home & Kitchen", "Beauty", "Clothing", 
        "Pet Supplies", "Outdoors", "Toys", "Health", "Automotive", "Office"
    ];

    // The Mega-List Matrix
    const items = {
        "Electronics": ["Mechanical Keyboard", "Smart Watch", "Webcam", "Bluetooth Speaker", "VR Headset", "External Hard Drive", "Projector", "Drawing Tablet", "Power Bank", "Drone", "Action Camera", "Noise Cancelling Headphones", "Gaming Mouse", "Microphone", "Wifi Extender", "Smart Plug", "Laptop Stand", "Monitor Light Bar", "Digital Picture Frame", "E-Reader"],
        "Home & Kitchen": ["Air Fryer", "Espresso Machine", "Weighted Blanket", "Cast Iron Skillet", "Robot Vacuum", "Herb Garden Kit", "Wine Decanter", "Oil Diffuser", "Neon Sign", "Electric Kettle", "Immersion Blender", "Milk Frother", "Magnetic Knife Bar", "Cold Brew Maker", "Towel Warmer", "Breakfast Sandwich Maker", "Air Purifier", "Pasta Machine", "Pizza Stone", "Electric Wine Opener"],
        "Beauty": ["Skincare Set", "Hair Dryer", "Massage Gun", "Makeup Mirror", "Electric Toothbrush", "Red Light Therapy Mask", "Beard Trimmer", "Jade Roller", "Ionic Hair Brush", "Bath Bomb Set", "Silk Pillowcase", "Foot Spa", "Microcurrent Device", "Manicure Kit", "Perfume Organizer", "Scalp Massager", "Paraffin Wax Bath", "Hair Straightener", "Blackhead Remover", "Makeup Brush Cleaner"],
        "Clothing": ["Leather Wallet", "Canvas Backpack", "Polarized Sunglasses", "Beanie", "Wrist Watch", "Bucket Hat", "Compression Socks", "Duffel Bag", "Silk Tie", "Rain Poncho", "Belt Buckle", "Crossbody Bag", "Tactical Gloves", "Scarf", "Bucket Hat", "Running Vest", "Travel Umbrella", "Jewelry Box", "Shoe Horn", "Laptop Bag"],
        "Pet Supplies": ["Automatic Feeder", "Cat Tree", "Dog Bed", "Aquarium Light", "Pet Camera", "Self-Cleaning Litter Box", "Dog Grooming Kit", "Bird Feeder", "Hamster Maze", "Pet Water Fountain", "Reptile Heat Lamp", "Interactive Fetch Machine", "Cat Nip Toy", "Dog Raincoat", "Pet Carrier", "Slow Feeder Bowl", "Aquarium Decor", "Scratching Post", "Pet Hair Remover", "Calming Treats"],
        "Outdoors": ["Camping Tent", "Hammock", "Binoculars", "Water Bottle", "Flashlight", "Portable Grill", "Camping Stove", "Sleeping Pad", "Telescopic Stool", "Hydration Pack", "Solar Charger", "Trekking Poles", "Life Jacket", "Inflatable Kayak", "Fishing Tackle Box", "Mosquito Repeller", "Multi-Tool", "Picnic Blanket", "Compass", "Bear Bell"],
        "Toys": ["LEGO Set", "Board Game", "RC Car", "Drone", "Puzzle", "Action Figure", "Model Rocket", "Chemistry Set", "Drawing Tablet", "Slime Kit", "Stuffed Animal", "Yo-Yo", "Trading Cards", "Marble Run", "Magic Kit", "Rubiks Cube", "Building Blocks", "Fidget Spinner", "Walkie Talkies", "Play Tent"],
        "Health": ["Yoga Mat", "Air Purifier", "Foam Roller", "Humidifier", "Scale", "First Aid Kit", "Vitamin Organizer", "Blood Pressure Monitor", "Posture Corrector", "Therapy Lamp", "Hand Sanitizer Bulk", "Heating Pad", "Neti Pot", "Knee Brace", "Blue Light Glasses", "Pulse Oximeter", "Resistance Bands", "Essential Oils", "Sleep Mask", "White Noise Machine"],
        "Automotive": ["Dash Cam", "Car Vacuum", "Jump Starter", "Phone Mount", "Tire Inflator", "Backseat Organizer", "Microfiber Towels", "Windshield Shade", "Car Trash Can", "Leather Cleaner", "OBD2 Scanner", "Ice Scraper", "Headrest Hook", "Emergency Flare Kit", "Car Scent", "Blind Spot Mirror", "Trunk Organizer", "Ceramic Coating", "Tire Pressure Gauge", "Car Wax"],
        "Office": ["Desk Lamp", "Ergonomic Mouse", "Monitor Stand", "Notebook Set", "Paper Shredder", "Whiteboard", "Desk Mat", "Standing Desk Converter", "File Organizer", "Label Maker", "Stapler", "Gel Pens", "Cable Management Box", "Digital Clock", "Planner", "Footrest", "Privacy Screen", "Letter Opener", "Clip Board", "Journal"],
        "All": ["Acoustic Foam", "Bonsai Kit", "Crystal Ball", "Djembe Drum", "Film Camera", "Gasket Set", "Hammock", "Isolator Pad", "Jigsaw Puzzle", "Kaleidoscope", "Lava Lamp", "Metal Detector", "Night Vision Goggles", "Ocarina", "Prism", "Quill Pen", "Retro Radio", "Sand Timer", "Telescope", "Unicycle"]
    };

    // 40 Unique Descriptors to multiply variety
    const modifiers = [
        "Vintage", "Professional", "Miniature", "Industrial", "Portable", "Luxury", "Smart", "Compact", "Retro", "Electric",
        "Minimalist", "Glowing", "Heavy Duty", "Wooden", "Gold", "Transparent", "Eco-Friendly", "Automated", "Foldable", "Waterproof",
        "Steampunk", "Cyberpunk", "Classic", "Handmade", "Travel", "High-Tech", "Rustic", "Matte Black", "Ergonomic", "Oversized",
        "Silent", "Magnetic", "Wireless", "Rechargeable", "Japanese Style", "Nordic", "Colorful", "Pocket-sized", "Experimental", "Universal"
    ];

    let activeCategory = "All";

    const grid = document.getElementById('categoryGrid');

    // Create the category toggles
    categories.forEach(cat => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.innerText = cat;
        
        chip.addEventListener('click', function() {
            const isAlreadyActive = this.classList.contains('active');
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            
            if (isAlreadyActive) {
                activeCategory = "All";
            } else {
                this.classList.add('active');
                activeCategory = cat;
            }
        });
        grid.appendChild(chip);
    });

    // The Logic Engine
    document.getElementById('surprise-btn').onclick = () => {
        let pool = [];

        if (activeCategory === "All") {
            Object.keys(items).forEach(key => {
                pool = pool.concat(items[key]);
            });
        } else {
            pool = items[activeCategory] && items[activeCategory].length > 0 
                   ? items[activeCategory] 
                   : items["All"];
        }

        // Randomly select one item and one modifier
        const randomItem = pool[Math.floor(Math.random() * pool.length)];
        const randomModifier = modifiers[Math.floor(Math.random() * modifiers.length)];
        
        // Final search string: e.g., "Vintage Mechanical Keyboard"
        const query = encodeURIComponent(`${randomModifier} ${randomItem}`);
        const amazonUrl = `https://www.amazon.com/s?k=${query}`;
        
        window.open(amazonUrl, '_blank');
    };
</script>

</body>
</html>
